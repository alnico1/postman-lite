services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-postman_lite}
      POSTGRES_USER: ${POSTGRES_USER:-postman_lite}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postman_lite_password}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 3s
      retries: 20

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 8080
      DATABASE_URL: ${DATABASE_URL:-postgresql://postman_lite:postman_lite_password@postgres:5432/postman_lite?schema=public}
      JWT_SECRET: ${JWT_SECRET:-dev_secret_change_me}
      CORS_ORIGIN: ${CORS_ORIGIN:-https://postman-api.ops-cloud.net}
    depends_on:
      postgres:
        condition: service_healthy
    expose:
      - "8080"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-https://postman-lite.ops-cloud.net}
    restart: unless-stopped
    depends_on:
      - backend
    expose:
      - "80"

volumes:
  postgres_data: